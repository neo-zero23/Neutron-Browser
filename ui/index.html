<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://suggestqueries.google.com https://api.bing.com https://duckduckgo.com https://www.startpage.com; img-src 'self' data: https:; media-src 'self' https:; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self';">
  <title>Neutron Browser</title>
  <link rel="stylesheet" href="style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="app-container">
    <!-- Custom Window Title Bar -->
    <header id="titlebar">
      <div class="drag-region">
        <div class="atom-logo">
          <svg id="logo-icon" viewBox="0 0 256 256" width="18" height="18" fill="currentColor">
            <g transform="translate(0.000000,256.000000) scale(0.100000,-0.100000)">
              <path d="M1015 2366 c-200 -53 -354 -135 -497 -266 -169 -154 -301 -402 -338 -632 -20 -123 -8 -351 24 -468 100 -360 373 -649 718 -759 148 -47 199 -54 390 -49 150 5 185 9 263 32 419 124 715 455 790 880 18 103 19 128 6 107 -12 -18 -18 3 -26 94 -27 277 -139 533 -315 719 -39 41 -125 116 -191 167 -73 56 -116 95 -109 99 16 10 -136 64 -233 84 -51 11 -128 16 -234 16 -132 -1 -173 -5 -248 -24z m363 -262 c69 -34 114 -89 170 -206 l47 -97 40 7 c22 4 83 7 135 6 114 -1 180 -25 234 -85 78 -85 56 -229 -56 -377 -27 -35 -48 -67 -48 -72 0 -5 18 -33 40 -62 22 -29 55 -82 73 -118 28 -56 32 -75 32 -140 0 -100 -27 -145 -112 -187 -53 -26 -67 -28 -168 -28 -60 0 -124 3 -140 7 -31 7 -31 6 -73 -86 -146 -316 -378 -316 -524 0 -42 92 -42 93 -73 86 -16 -4 -79 -7 -140 -7 -101 0 -115 2 -168 28 -85 42 -112 87 -112 186 0 65 5 86 32 141 18 36 51 89 74 119 47 61 47 56 -25 158 -103 144 -114 286 -30 365 55 51 119 72 224 72 52 1 113 -2 136 -6 l40 -8 37 83 c51 112 112 187 178 221 67 33 111 33 177 0z"/>
              <path d="M1252 2058 c-19 -5 -53 -29 -76 -53 -45 -45 -131 -204 -118 -216 4 -4 32 -14 62 -24 30 -10 80 -28 111 -41 l57 -23 58 23 c33 13 85 32 117 42 66 20 68 26 32 103 -68 145 -156 214 -243 189z"/>
              <path d="M696 1736 c-51 -19 -94 -62 -102 -102 -12 -66 35 -183 113 -278 l22 -27 95 78 c52 43 97 87 100 98 15 64 43 231 39 235 -3 3 -55 6 -116 8 -78 1 -124 -2 -151 -12z"/>
              <path d="M1632 1743 c-15 -3 -22 -10 -18 -19 3 -8 13 -56 22 -106 9 -51 18 -102 21 -113 2 -11 47 -55 99 -98 l95 -78 22 27 c79 96 125 212 113 279 -8 41 -61 90 -113 104 -37 11 -194 13 -241 4z"/>
              <path d="M1021 1683 c-16 -62 -24 -136 -15 -132 13 6 145 79 173 96 13 8 19 18 15 23 -11 9 -133 50 -151 50 -7 0 -17 -17 -22 -37z"/>
              <path d="M1452 1696 c-35 -12 -63 -26 -61 -31 2 -13 180 -117 187 -110 5 5 -15 124 -26 153 -6 16 -26 14 -100 -12z"/>
              <path d="M1162 1566 c-62 -36 -129 -76 -147 -91 l-35 -26 0 -174 0 -173 78 -50 c43 -28 113 -67 155 -88 l77 -38 77 38 c42 21 112 60 155 88 l78 50 -2 177 -3 176 -68 46 c-69 46 -225 129 -242 129 -6 0 -61 -29 -123 -64z m219 -195 c34 -34 39 -44 39 -85 0 -88 -49 -140 -130 -140 -81 0 -130 52 -130 140 0 41 5 51 39 85 35 35 44 39 91 39 47 0 56 -4 91 -39z"/>
              <path d="M839 1340 l-64 -60 63 -60 c35 -34 66 -60 67 -58 6 5 8 228 3 233 -2 3 -33 -22 -69 -55z"/>
              <path d="M1670 1280 l0 -122 38 30 c20 17 50 44 66 61 29 30 29 31 10 52 -10 12 -40 39 -66 61 l-48 40 0 -122z"/>
              <path d="M695 1187 c-49 -57 -94 -152 -101 -212 -7 -69 16 -112 80 -144 41 -21 62 -25 145 -25 125 0 155 7 145 37 -4 12 -15 67 -24 121 -15 91 -19 101 -51 128 -19 17 -62 54 -96 84 l-62 54 -36 -43z"/>
              <path d="M1775 1167 c-38 -35 -81 -70 -93 -79 -20 -13 -27 -34 -42 -125 -11 -59 -22 -116 -25 -125 -9 -24 29 -32 146 -32 83 0 104 4 145 25 63 32 87 75 80 142 -6 60 -55 159 -104 214 l-37 42 -70 -62z"/>
              <path d="M1003 965 c12 -83 26 -125 44 -125 25 0 153 43 153 51 0 4 -28 23 -62 42 -35 19 -81 45 -102 58 l-39 23 6 -49z"/>
              <path d="M1545 994 c-11 -9 -53 -34 -92 -56 -40 -22 -73 -43 -73 -47 0 -8 128 -51 153 -51 17 0 32 42 43 124 7 49 1 55 -31 30z"/>
              <path d="M1222 830 c-24 -11 -69 -27 -100 -36 -32 -9 -60 -19 -65 -23 -14 -14 72 -171 121 -220 79 -79 144 -80 221 -2 43 42 115 162 123 204 2 14 -17 24 -97 53 -126 45 -150 48 -203 24z"/>
            </g>
          </svg>
        </div>
        <div id="tabs-list">
          <!-- Dynamic tabs will be inserted here -->
        </div>
        <button id="add-tab-btn" title="New tab">+</button>
      </div>
      <div class="window-controls">
        <button id="win-minimize" class="win-btn">—</button>
        <button id="win-maximize" class="win-btn">🗖</button>
        <button id="win-close" class="win-btn win-btn-close">✕</button>
      </div>
    </header>

    <!-- Main Workspace Container -->
    <div id="main-layout">
      <aside id="vertical-tabs-rail" class="vertical-tabs-rail hidden"></aside>

      <!-- Sidebar Navigation -->
      <aside id="sidebar">
        <div id="sidebar-apps-list" class="sidebar-apps">
        </div>
        <button id="sidebar-add-btn" class="sidebar-btn add-btn" title="Add sidebar shortcut" aria-label="Add sidebar shortcut">+</button>

        <div class="sidebar-footer">
          <button id="sidebar-fav-btn" class="sidebar-btn" title="Favoritos">★</button>
          <button id="atomic-mode-btn" class="sidebar-btn atomic-btn" title="Modo Atómico — Sin rastro">🔒</button>
          <button id="clean-cache-btn" class="sidebar-btn clean-btn" title="Limpiar Caché y RAM">🧹</button>

          <div class="ram-meter-container" title="Uso de RAM de Neutron">
            <div id="ram-fill" class="ram-meter-fill"></div>
          </div>
          <span id="ram-text" class="ram-label">0MB</span>

          <button id="panic-btn" class="sidebar-btn panic-btn"
            title="¡Botón de Pánico! Silenciar y Minimizar">✕</button>
        </div>
      </aside>

      <!-- Content Area -->
      <main id="content-container">
        <div id="toolbar">
          <!-- Toggle sidebar button — always first, always visible -->
          <button id="toggle-sidebar" class="nav-btn toggle-btn" title="Ocultar/Mostrar barra lateral">
            <svg id="toggle-icon-open" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path d="M3 3h18v18H3V3zm2 2v14h4V5H5zm6 0v14h8V5h-8z" />
            </svg>
            <svg id="toggle-icon-closed" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"
              style="display:none;">
              <path d="M3 3h18v18H3V3zm2 2v14h14V5H5z" />
            </svg>
          </button>

          <button id="nav-back" class="nav-btn" title="Atrás">←</button>
          <button id="nav-forward" class="nav-btn" title="Adelante">→</button>
          <button id="nav-reload" class="nav-btn" title="Recargar">↻</button>
          <button id="nav-home" class="nav-btn" title="Inicio">⌂</button>

          <div id="search-container" class="url-bar-container">
            <input id="url-input" type="text" placeholder="Search Google or enter a URL...">
            <ul id="suggestions-list" class="suggestions-list"></ul>
            <div id="loading-progress" class="progress-bar-hidden"></div>
            <div id="fav-btn-group" class="fav-btn-group">
              <button id="fav-btn" class="fav-btn" title="Add to favorites">
                <svg id="fav-star" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                  stroke-width="2">
                  <polygon
                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                </svg>
              </button>
              <button id="fav-chevron" class="fav-chevron" title="Add to...">▾</button>
            </div>
          </div>

          <span id="zoom-indicator" class="zoom-indicator" style="display:none">100%</span>

          <div id="profile-indicator" class="profile-indicator" title="">
            <div id="profile-avatar" class="profile-avatar">
              <span id="profile-avatar-text"></span>
              <img id="profile-avatar-img" style="display:none">
            </div>
            <svg viewBox="0 0 24 24" width="8" height="8" fill="currentColor">
              <path d="M7 10l5 5 5-5z" />
            </svg>
          </div>
          <button id="shield-btn" class="nav-btn shield-btn" title="Protecciones">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path
                d="M12 2L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-3zm0 17.5c-3.75-1.07-6.5-4.46-6.5-8.5V7.19l6.5-2.09v14.4z" />
            </svg>
            <span id="shield-count-badge" class="shield-count-badge">0</span>
          </button>
          <button id="downloads-btn" class="nav-btn downloads-btn" title="Descargas">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
            </svg>
            <span id="download-count-badge" class="download-count-badge" style="display:none;">0</span>
          </button>
          <button id="quick-settings-btn" class="nav-btn quick-settings-btn" title="Más opciones">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <circle cx="12" cy="5" r="2"/>
              <circle cx="12" cy="12" r="2"/>
              <circle cx="12" cy="19" r="2"/>
            </svg>
          </button>
        </div>

        <!-- The WebContentsView is mounted dynamically in main.js -->
      </main>
    </div>
  </div>

  <!-- Quick Settings Dropdown -->
  <div id="quick-settings-dropdown" class="quick-settings-dropdown hidden">
    <div class="qs-item" data-action="settings">
      <span class="qs-icon">⚙️</span>
      <span class="qs-label" data-i18n="settings">Settings</span>
    </div>
    <div class="qs-item" data-action="history">
      <span class="qs-icon">🕐</span>
      <span class="qs-label" data-i18n="history">History</span>
    </div>
    <div class="qs-item" data-action="taskmanager">
      <span class="qs-icon">⚡</span>
      <span class="qs-label" data-i18n="taskManager">Task Manager</span>
    </div>
    <div class="qs-divider"></div>
    <div class="qs-item" data-action="about">
      <span class="qs-icon">ℹ️</span>
      <span class="qs-label" data-i18n="about">About Neutron</span>
    </div>
  </div>

  <!-- Profile Dropdown (toolbar) -->
  <div id="profile-dropdown" class="profile-dropdown hidden">
    <div id="profile-dropdown-list" class="profile-dropdown-list"></div>
    <div class="profile-dropdown-footer">
      <button id="new-profile-btn" class="profile-dropdown-btn">+ New profile</button>
      <button id="guest-mode-btn" class="profile-dropdown-btn guest-btn">Guest mode</button>
    </div>
  </div>

  <!-- Profile Modal (first-run overlay) -->
  <div id="profile-modal" class="profile-modal hidden">
    <div class="profile-modal-backdrop"></div>
    <div class="profile-modal-content">
      <div class="profile-modal-header">
        <h2>Welcome to Neutron</h2>
        <p>Choose a profile to start</p>
      </div>
      <div id="modal-profile-list" class="modal-profile-list"></div>
      <div class="profile-modal-footer">
        <button id="modal-new-profile-btn" class="profile-modal-btn">+ New profile</button>
        <button id="modal-guest-btn" class="profile-modal-btn guest-btn">Guest mode</button>
      </div>
    </div>
  </div>

  <!-- New Profile Dialog -->
  <div id="new-profile-dialog" class="profile-modal hidden">
    <div class="profile-modal-backdrop"></div>
    <div class="profile-modal-content profile-dialog-sm">
      <h3>New profile</h3>
      <div class="profile-dialog-form">
        <input id="new-profile-name" type="text" placeholder="Profile name" maxlength="20">
        <input id="new-profile-color" type="color" value="#8c8c8c">
      </div>
      <div class="profile-dialog-actions">
        <button id="cancel-profile-btn" class="profile-modal-btn cancel-btn">Cancel</button>
        <button id="confirm-profile-btn" class="profile-modal-btn confirm-btn">Create</button>
      </div>
    </div>
  </div>

  <!-- Profile Edit Modal -->
  <div id="profile-edit-modal" class="profile-modal hidden">
    <div class="profile-modal-backdrop"></div>
    <div class="profile-modal-content profile-dialog-sm">
      <h3 id="profile-edit-title">Editar perfil</h3>
      <div class="profile-edit-avatar" id="profile-edit-avatar" title="Cambiar foto">
        <span id="profile-edit-avatar-text"></span>
        <img id="profile-edit-avatar-img" style="display:none">
        <div class="profile-edit-avatar-overlay">📷</div>
      </div>
      <button id="profile-edit-remove-photo" class="profile-edit-remove-photo" style="display:none">Eliminar foto</button>
      <div class="profile-dialog-form">
        <input id="profile-edit-name" type="text" placeholder="Nombre" maxlength="20">
        <input id="profile-edit-color" type="color">
      </div>
      <div class="profile-dialog-actions">
        <button id="profile-edit-save" class="profile-modal-btn confirm-btn">Guardar</button>
        <button id="profile-edit-cancel" class="profile-modal-btn cancel-btn">Cancelar</button>
      </div>
      <button id="profile-edit-delete" class="profile-edit-delete-btn">Eliminar perfil</button>
    </div>
  </div>
  <!-- Bookmark type dropdown (fav-btn chevron) -->
  <div id="fav-dropdown" class="fav-dropdown hidden">
    <ul>
      <li data-type="fav" data-label="Favorites">★ Add to Favorites</li>
      <li data-type="sidebar" data-label="Sidebar">📌 Add to Sidebar</li>
      <li data-type="home" data-label="Home">⌂ Add to Home</li>
    </ul>
  </div>

  <!-- Bookmark context menu (right-click) -->
  <div id="bookmark-ctx-menu" class="bookmark-ctx-menu hidden">
    <ul>
      <li id="bookmark-ctx-remove">✕ Eliminar marcador</li>
    </ul>
  </div>

  <!-- Modal overlay for adding custom sidebar shortcut -->
  <div id="add-sidebar-shortcut-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">Add sidebar shortcut</div>
      <div class="modal-field">
        <label for="sidebar-shortcut-name-input">Name</label>
        <input type="text" id="sidebar-shortcut-name-input" placeholder="e.g. Twitch" autocomplete="off">
      </div>
      <div class="modal-field">
        <label for="sidebar-shortcut-url-input">URL (web address)</label>
        <input type="text" id="sidebar-shortcut-url-input" placeholder="e.g. https://twitch.tv" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="modal-btn cancel-btn" id="close-sidebar-modal-btn">Cancel</button>
        <button class="modal-btn save-btn" id="save-sidebar-shortcut-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="renderer.js"></script>
</body>

</html>
