<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
  <title>Historial - Neutron Browser</title>
  <link rel="stylesheet" href="history-style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet">
</head>
<body>
  <div id="history-app">
    <div class="history-header">
      <h3>Historial de navegación</h3>
      <div class="history-actions">
        <button id="clear-history-btn" class="history-action-btn" title="Borrar todo">Borrar todo</button>
        <button id="close-history-btn" class="history-close-btn" title="Cerrar">✕</button>
      </div>
    </div>
    <div id="history-list" class="history-list"></div>
  </div>

  <script src="i18n.js"></script>
  <script src="history-renderer.js"></script>
</body>
</html>
