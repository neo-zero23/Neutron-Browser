<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://suggestqueries.google.com https://api.bing.com https://duckduckgo.com https://www.startpage.com; img-src 'self' data: https:; media-src 'self' https:; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self';">
  <title>Neutron</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root, body.theme-dark {
      --bg: #131314;
      --accent-blue-preset: #5ba3d1;
      --accent-blue: var(--accent-blue-current, var(--accent-blue-preset));
      --text-primary: #e5e5e5;
      --text-muted: #71717a;
      --border-subtle: rgba(255, 255, 255, 0.05);
      --accent-red: #e22d3d;
      --search-bg: rgba(255, 255, 255, 0.02);
      --search-border: var(--accent-blue);
      --suggestions-bg: #1a1a1a;
      --suggestions-border: #444;
      --shortcut-hover: rgba(255, 255, 255, 0.03);
    }

    body.theme-light {
      --bg: #e9edf2;
      --accent-blue-preset: #2563eb;
      --accent-blue: var(--accent-blue-current, var(--accent-blue-preset));
      --accent-red: #dc2626;
      --text-primary: #243041;
      --text-muted: #64748b;
      --border-subtle: rgba(15, 23, 42, 0.08);
      --search-bg: rgba(248, 250, 252, 0.82);
      --search-border: var(--accent-blue);
      --suggestions-bg: #f8fafc;
      --suggestions-border: #d2dae6;
      --shortcut-hover: rgba(15, 23, 42, 0.04);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 20px;
    }

    .atom-logo {
      color: var(--accent-blue);
      opacity: 0.9;
      transition: transform 0.4s ease;
    }

    .atom-logo:hover {
      transform: scale(1.03);
    }

    .brand-text {
      margin-top: -24px;
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 500;
    }

    .search-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 580px;
    }

    .search-bar {
      display: flex;
      width: 100%;
      border: 2px solid var(--search-border);
      border-radius: 10px;
      background: var(--search-bg);
      padding: 3px;
      transition: border-color 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .search-bar:focus-within {
      border-color: var(--accent-blue);
      box-shadow: 0 0 16px color-mix(in srgb, var(--accent-blue) 18%, transparent);
    }

    #search-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 12px 16px;
      outline: none;
      user-select: text;
    }

    #search-input::placeholder {
      color: var(--text-muted);
    }

    #search-btn {
      background: var(--accent-blue);
      color: #131314;
      border: none;
      padding: 10px 28px;
      border-radius: 7px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    #search-btn:hover {
      filter: brightness(1.3);
    }

    #search-btn:active {
      transform: scale(0.97);
    }

    .search-caption {
      margin-top: 16px;
      color: var(--text-muted);
      font-size: 10px;
      letter-spacing: 6px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .shortcuts-grid {
      display: grid;
      grid-template-columns: repeat(4, 90px);
      gap: 28px;
      margin-top: 10px;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-muted);
      text-decoration: none;
      transition: opacity 0.3s ease, color 0.3s ease;
      cursor: pointer;
      padding: 16px 10px;
      border-radius: 12px;
    }

    .shortcut:hover {
      opacity: 1;
      color: var(--text-primary);
      background: var(--shortcut-hover);
    }

    .shortcut-favicon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.25s ease;
      margin-bottom: 10px;
    }

    .shortcut-favicon.loaded {
      opacity: 1;
    }

    .shortcut span {
      font-size: 11px;
      font-weight: 500;
    }

    .search-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      z-index: 9999;
      background: var(--suggestions-bg);
      border: 1px solid var(--suggestions-border);
      border-radius: 0 0 8px 8px;
      list-style: none;
      padding: 5px 0;
      display: none;
      margin: 0;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }

    .search-suggestions li {
      padding: 10px 16px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      cursor: pointer;
    }

    .search-suggestions li:hover,
    .search-suggestions li.active {
      background-color: color-mix(in srgb, var(--accent-blue) 12%, transparent);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="atom-logo">
      <svg viewBox="0 0 100 100" width="80" height="80">
        <circle cx="50" cy="50" r="6" fill="currentColor" />
        <ellipse cx="50" cy="50" rx="38" ry="14" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.7" />
        <ellipse cx="50" cy="50" rx="38" ry="14" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.7"
          transform="rotate(60 50 50)" />
        <ellipse cx="50" cy="50" rx="38" ry="14" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.7"
          transform="rotate(120 50 50)" />
        <circle cx="50" cy="36" r="3" fill="currentColor" opacity="0.8" />
        <circle cx="62" cy="57" r="3" fill="currentColor" opacity="0.8" />
        <circle cx="38" cy="57" r="3" fill="currentColor" opacity="0.8" />
      </svg>
    </div>
    <p class="brand-text">NEUTRON</p>

    <div class="search-wrapper">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Buscar o escribir URL..." autocomplete="off"
          spellcheck="false">
        <ul id="search-suggestions" class="search-suggestions"></ul>
        <button id="search-btn">Search</button>
      </div>
      <p class="search-caption">A browser for everyone</p>
    </div>

    <div class="shortcuts-grid" id="home-shortcuts"></div>
  </div>

  <div id="home-ctx-menu" class="home-ctx-menu hidden">
    <ul>
      <li id="home-ctx-remove">✕ Eliminar marcador</li>
    </ul>
  </div>

  <style>
    .home-ctx-menu.hidden {
      display: none;
    }
    .home-ctx-menu {
      position: fixed;
      z-index: 99999;
      background: var(--suggestions-bg);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 4px 0;
      min-width: 160px;
      backdrop-filter: blur(12px);
    }
    .home-ctx-menu ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .home-ctx-menu li {
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-primary);
    }
    .home-ctx-menu li:hover {
      background: rgba(234, 45, 61, 0.15);
      color: var(--accent-red, #e22d3d);
    }
  </style>

  <script src="i18n.js"></script>
  <script>
    const homeCtxMenu = document.getElementById('home-ctx-menu');
    let homeCtxUrl = '';

    function applyHomeTheme(theme, accentColor) {
      document.body.classList.remove('theme-dark', 'theme-light');
      document.body.classList.add(theme === 'light' ? 'theme-light' : 'theme-dark');
      const color = accentColor || '#5ba3d1';
      document.documentElement.style.setProperty('--accent-blue-current', color);
      document.documentElement.style.setProperty('--accent-blue', color);
      document.documentElement.style.setProperty('--search-border', color);
    }

    function applyHomeBackground(path) {
      if (path) {
        document.body.style.backgroundImage = `url('file:///${path.replace(/\\/g, '/')}')`;
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundPosition = 'center';
        document.body.style.backgroundRepeat = 'no-repeat';
      } else {
        document.body.style.backgroundImage = '';
      }
    }

    window.api.loadSettings().then(s => {
      if (window.NeutronI18n) window.NeutronI18n.applyHomePage(s.language || 'es');
      if (s.homeBackgroundPath) applyHomeBackground(s.homeBackgroundPath);
      applyHomeTheme(s.theme || 'dark', s.accentColor || '#5ba3d1');
    });

    window.api.onHomeBackgroundChanged((path) => applyHomeBackground(path));
    window.api.onThemeChanged(({ theme, accentColor }) => applyHomeTheme(theme, accentColor));
    if (window.api && window.api.onSettingsUpdated) {
      window.api.onSettingsUpdated((config) => {
        if (config.language && window.NeutronI18n) {
          window.NeutronI18n.applyHomePage(config.language);
        }
      });
    }

    const searchInput = document.getElementById('search-input');
    const searchBtn = document.getElementById('search-btn');
    const searchSuggestions = document.getElementById('search-suggestions');

    const HomeSuggestionManager = {
      debouncer: null,
      activeIndex: -1,
      localResults: null,
      googleResults: null,

      _merge() {
        const seen = new Set();
        const result = [];
        for (const s of (this.localResults || [])) {
          if (!seen.has(s)) { seen.add(s); result.push(s); }
        }
        for (const s of (this.googleResults || [])) {
          if (!seen.has(s)) { seen.add(s); result.push(s); }
        }
        return result.slice(0, 12);
      },

      render() {
        const merged = this._merge();
        searchSuggestions.innerHTML = '';
        if (merged.length === 0) {
          searchSuggestions.style.display = 'none';
          return;
        }

        this.activeIndex = -1;

        for (const text of merged) {
          const li = document.createElement('li');
          li.textContent = text;
          li.addEventListener('mousedown', (e) => {
            e.preventDefault();
            searchInput.value = text;
            this.hide();
            navigate();
          });
          searchSuggestions.appendChild(li);
        }

        searchSuggestions.style.display = 'block';
      },

      show() {
        this.render();
      },

      hide() {
        searchSuggestions.style.display = 'none';
        searchSuggestions.innerHTML = '';
        this.activeIndex = -1;
      },

      highlight(direction) {
        const items = searchSuggestions.querySelectorAll('li');
        if (items.length === 0) return;

        if (this.activeIndex !== -1) items[this.activeIndex].classList.remove('active');

        this.activeIndex += direction;
        if (this.activeIndex < 0) this.activeIndex = items.length - 1;
        if (this.activeIndex >= items.length) this.activeIndex = 0;

        items[this.activeIndex].classList.add('active');
        items[this.activeIndex].scrollIntoView({ block: 'nearest' });
      }
    };

    window.api.onLocalSuggestions((results) => {
      HomeSuggestionManager.localResults = results;
      HomeSuggestionManager.render();
    });

    window.api.onSuggestions((results) => {
      HomeSuggestionManager.googleResults = results;
      HomeSuggestionManager.render();
    });

    searchInput.addEventListener('input', () => {
      HomeSuggestionManager.activeIndex = -1;
      clearTimeout(HomeSuggestionManager.debouncer);
      HomeSuggestionManager.localResults = null;
      HomeSuggestionManager.googleResults = null;

      if (!searchInput.value.trim()) {
        HomeSuggestionManager.hide();
        return;
      }

      window.api.requestLocalSuggestions(searchInput.value);

      HomeSuggestionManager.debouncer = setTimeout(() => {
        window.api.requestSuggestions(searchInput.value);
      }, 500);
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const activeLi = searchSuggestions.querySelector('li.active');
        if (activeLi && searchSuggestions.style.display !== 'none') {
          searchInput.value = activeLi.textContent;
          HomeSuggestionManager.hide();
          navigate();
        } else {
          navigate();
          searchInput.blur();
        }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        HomeSuggestionManager.highlight(1);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        HomeSuggestionManager.highlight(-1);
      } else if (e.key === 'Escape') {
        HomeSuggestionManager.hide();
        searchInput.blur();
      }
    });

    searchInput.addEventListener('focus', () => {
      if (searchSuggestions.children.length > 0) {
        searchSuggestions.style.display = 'block';
      }
    });

    searchInput.addEventListener('blur', () => {
      setTimeout(() => HomeSuggestionManager.hide(), 150);
    });

    document.addEventListener('click', (e) => {
      if (!searchSuggestions.contains(e.target) && e.target !== searchInput) {
        HomeSuggestionManager.hide();
      }
    });

    function navigate() {
      const q = searchInput.value.trim();
      if (q) window.api.searchQuery(q);
    }

    searchBtn.addEventListener('click', navigate);

    const FALLBACK_FAVICON = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2371717a'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z'/%3E%3C/svg%3E";

    function extractDomain(url) {
      try { return new URL(url).hostname || ''; } catch (e) { return ''; }
    }

    function loadFavicon(imgEl, domain, size) {
      const url = domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=${size || 16}` : '';
      if (!url) {
        imgEl.src = FALLBACK_FAVICON;
        imgEl.classList.add('loaded');
        return;
      }
      imgEl.onload = () => imgEl.classList.add('loaded');
      imgEl.onerror = () => {
        imgEl.src = FALLBACK_FAVICON;
        imgEl.classList.add('loaded');
      };
      imgEl.src = url;
    }

    function renderHomeShortcuts(data) {
      const grid = document.getElementById('home-shortcuts');
      grid.innerHTML = '';
      (data.home || []).forEach(item => {
        const a = document.createElement('a');
        a.className = 'shortcut';
        a.setAttribute('data-url', item.url);
        const img = document.createElement('img');
        img.className = 'shortcut-favicon';
        img.alt = item.title || '';
        img.width = 36;
        img.height = 36;
        const span = document.createElement('span');
        span.textContent = item.title || item.domain || '';
        a.appendChild(img);
        a.appendChild(span);
        a.addEventListener('click', (e) => {
          e.preventDefault();
          window.api.navigateTo(item.url);
        });
        a.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          homeCtxUrl = item.url;
          homeCtxMenu.style.left = e.clientX + 'px';
          homeCtxMenu.style.top = e.clientY + 'px';
          homeCtxMenu.classList.remove('hidden');
        });
        grid.appendChild(a);
        loadFavicon(img, item.domain || extractDomain(item.url), 64);
      });
    }

    document.getElementById('home-ctx-remove').addEventListener('click', () => {
      if (homeCtxUrl) {
        window.api.removeBookmark({ type: 'home', url: homeCtxUrl });
      }
      homeCtxMenu.classList.add('hidden');
      homeCtxUrl = '';
    });

    document.addEventListener('click', () => {
      homeCtxMenu.classList.add('hidden');
      homeCtxUrl = '';
    });

    window.api.getBookmarks().then(data => {
      renderHomeShortcuts(data);
    });
    window.api.onBookmarksUpdated(data => {
      renderHomeShortcuts(data);
    });
  </script>
</body>

</html>
